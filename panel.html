<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Resp Diff</title>
<style>
  /* ── Reset & Base ─────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 13px;
    background: #1e1e1e;
    color: #d4d4d4;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Header ───────────────────────────────────── */
  .header {
    padding: 8px 12px;
    background: #252526;
    border-bottom: 1px solid #3c3c3c;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .header h1 {
    font-size: 14px;
    font-weight: 600;
    color: #e2e2e2;
    flex: 1;
  }
  .header h1 span { color: #4ec9b0; font-size: 11px; vertical-align: super; }
  .btn {
    padding: 4px 10px;
    border: 1px solid #555;
    border-radius: 3px;
    background: #3c3c3c;
    color: #ccc;
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
  }
  .btn:hover { background: #505050; }
  .btn.primary { background: #0e639c; border-color: #1177bb; color: #fff; }
  .btn.primary:hover { background: #1177bb; }
  .btn.danger { background: #5a1d1d; border-color: #7a2d2d; color: #f48771; }
  .btn.danger:hover { background: #7a2d2d; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Snapshot List ────────────────────────────── */
  .snapshot-list {
    flex: 0 0 auto;
    max-height: 200px;
    overflow-y: auto;
    border-bottom: 1px solid #3c3c3c;
  }
  .snapshot-item {
    padding: 6px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid #2a2a2a;
    cursor: pointer;
    user-select: none;
  }
  .snapshot-item:hover { background: #2a2d2e; }
  .snapshot-item.selected { background: #094771; }
  .snapshot-item .method {
    font-weight: 700;
    font-size: 10px;
    width: 36px;
    text-align: center;
    border-radius: 2px;
    padding: 2px 0;
    flex-shrink: 0;
  }
  .method.GET  { background: #1b4f2b; color: #4ec9b0; }
  .method.POST { background: #4a2f00; color: #ce9178; }
  .method.PUT  { background: #0d3b66; color: #569cd6; }
  .method.PATCH{ background: #4a3800; color: #dcdcaa; }
  .method.DELETE{background: #6a1b1b; color: #f48771; }
  .snapshot-item .url {
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-size: 12px;
    color: #9cdcfe;
  }
  .snapshot-item .status { font-size: 11px; color: #b5cea8; flex-shrink: 0; }
  .snapshot-item .status.error { color: #f48771; }
  .snapshot-item .time { font-size: 10px; color: #6a6a6a; flex-shrink: 0; }
  .snapshot-item .del-btn {
    background: none; border: none; color: #666; cursor: pointer;
    font-size: 14px; padding: 2px 4px; flex-shrink: 0;
  }
  .snapshot-item .del-btn:hover { color: #f48771; }
  .empty-msg { padding: 16px 12px; color: #666; font-style: italic; font-size: 12px; text-align: center; }

  /* ── Capture bar ──────────────────────────────── */
  .capture-bar {
    padding: 6px 12px;
    background: #252526;
    border-bottom: 1px solid #3c3c3c;
    display: flex;
    gap: 8px;
    align-items: center;
    flex-shrink: 0;
  }
  .capture-bar label { font-size: 11px; color: #999; }
  .capture-bar select {
    background: #3c3c3c; color: #ccc; border: 1px solid #555;
    border-radius: 3px; padding: 3px 6px; font-size: 12px;
  }

  /* ── Diff Panel ───────────────────────────────── */
  .diff-panel {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .diff-header {
    padding: 6px 12px;
    background: #252526;
    border-bottom: 1px solid #3c3c3c;
    display: flex;
    gap: 12px;
    align-items: center;
    font-size: 11px;
    color: #999;
    flex-shrink: 0;
  }
  .diff-header .added   { color: #4ec9b0; }
  .diff-header .removed { color: #f48771; }
  .diff-header .changed { color: #dcdcaa; }

  .diff-body {
    flex: 1;
    display: flex;
    overflow: hidden;
  }
  .diff-side {
    flex: 1;
    overflow-y: auto;
    padding: 8px 12px;
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    font-size: 12px;
    line-height: 1.5;
  }
  .diff-side:first-child { border-right: 1px solid #3c3c3c; }
  .diff-side h3 {
    font-size: 11px;
    color: #999;
    margin-bottom: 6px;
    padding-bottom: 4px;
    border-bottom: 1px solid #333;
  }
  .diff-line { white-space: pre-wrap; word-break: break-all; }
  .diff-line.added   { background: rgba(78, 201, 176, 0.08); }
  .diff-line.removed { background: rgba(244, 135, 113, 0.08); }
  .diff-line.changed { background: rgba(220, 220, 170, 0.08); }
  .key { color: #9cdcfe; }
  .val-string { color: #ce9178; }
  .val-number { color: #b5cea8; }
  .val-bool   { color: #569cd6; }
  .val-null   { color: #569cd6; }

  /* ── Scrollbar ────────────────────────────────── */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: #1e1e1e; }
  ::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }

  /* ── Captured toast ───────────────────────────── */
  .toast {
    position: fixed; bottom: 12px; right: 12px;
    background: #094771; color: #fff; padding: 6px 12px;
    border-radius: 4px; font-size: 12px; opacity: 0;
    transition: opacity 0.3s; pointer-events: none;
    z-index: 999;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <h1>Resp Diff <span>v0.1</span></h1>
  <button class="btn" id="refreshBtn" title="Refresh snapshot list">Refresh</button>
  <button class="btn danger" id="clearAllBtn">Clear All</button>
</div>

<!-- Snapshot List -->
<div class="snapshot-list" id="snapshotList">
  <div class="empty-msg">No snapshots yet. Browse any site and responses will appear below — click one to capture.</div>
</div>

<!-- Diff Selection Bar -->
<div class="capture-bar">
  <label>Diff A:</label>
  <select id="diffASelect"><option value="">—</option></select>
  <label>Diff B:</label>
  <select id="diffBSelect"><option value="">—</option></select>
  <button class="btn primary" id="diffBtn" disabled>Diff</button>
  <button class="btn" id="swapBtn" disabled>Swap</button>
</div>

<!-- Diff Panel -->
<div class="diff-panel" id="diffPanel">
  <div class="diff-header" id="diffHeader">
    Select two snapshots above to diff, or click a snapshot below.
  </div>
  <div class="diff-body" id="diffBody">
    <div class="diff-side" id="diffLeft"><h3>Snapshot A</h3></div>
    <div class="diff-side" id="diffRight"><h3>Snapshot B</h3></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="panel.js"></script>
</body>
</html>
